# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  reports_data:
    driver: local
  outputs_data:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16