# ══════════════════════════════════════════════════════════════════════════════
# NeighbourWise AI — Docker Compose (Fixed for Windows local dev)
# ══════════════════════════════════════════════════════════════════════════════
#
# LOCAL DEV:
#   1. Make sure .env file exists in this same folder (scripts/)
#   2. docker compose up --build
#
# EC2 DEPLOY:
#   docker compose -f docker-compose.yaml up -d --build
#
# ══════════════════════════════════════════════════════════════════════════════

# ── Shared environment block ──────────────────────────────────────────────────
x-app-env: &app-env
  SNOWFLAKE_ACCOUNT:       ${SNOWFLAKE_ACCOUNT}
  SNOWFLAKE_USER:          ${SNOWFLAKE_USER}
  SNOWFLAKE_PASSWORD:      ${SNOWFLAKE_PASSWORD}
  SNOWFLAKE_WAREHOUSE:     ${SNOWFLAKE_WAREHOUSE:-COMPUTE_WH}
  SNOWFLAKE_DATABASE:      ${SNOWFLAKE_DATABASE:-NEIGHBOURWISE_DOMAINS}
  SNOWFLAKE_SCHEMA:        ${SNOWFLAKE_SCHEMA:-MARTS}
  SNOWFLAKE_ROLE:          ${SNOWFLAKE_ROLE:-SYSADMIN}
  ANTHROPIC_API_KEY:       ${ANTHROPIC_API_KEY}
  OPENAI_API_KEY:          ${OPENAI_API_KEY}
  SERPER_API_KEY:          ${SERPER_API_KEY}
  NEO4J_URI:               ${NEO4J_URI}
  NEO4J_USERNAME:          ${NEO4J_USERNAME:-neo4j}
  NEO4J_PASSWORD:          ${NEO4J_PASSWORD}
  AWS_ACCESS_KEY_ID:       ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY:   ${AWS_SECRET_ACCESS_KEY:-}
  AWS_DEFAULT_REGION:      ${AWS_DEFAULT_REGION:-us-east-2}
  S3_BUCKET:               ${S3_BUCKET:-neighborwise-ai-s3-bucket}
  MAPBOX_API_KEY:          ${MAPBOX_API_KEY:-}
  PYTHONUNBUFFERED:        "1"
  PYTHONDONTWRITEBYTECODE: "1"
  TZ:                      America/New_York

services:

  # ════════════════════════════════════════════════════════════════════════════
  # BACKEND — FastAPI on port 8001
  # ════════════════════════════════════════════════════════════════════════════
  backend:
    restart: unless-stopped
    build:
      dockerfile: Dockerfile.backend
    image: neighbourwise-backend:latest
    container_name: neighbourwise-backend

    env_file:
      - .env

    environment:
      <<: *app-env
      PORT: "8001"

    ports:
      - "8001:8001"

    volumes:
      - reports_data:/app/reports
      - outputs_data:/app/outputs

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

    networks:
      - app_net

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ════════════════════════════════════════════════════════════════════════════
  # FRONTEND — Streamlit on port 8501
  # ════════════════════════════════════════════════════════════════════════════
  frontend:
    restart: unless-stopped
    build:
      dockerfile: Dockerfile.frontend
    image: neighbourwise-frontend:latest
    container_name: neighbourwise-frontend

    env_file:
      - .env

    environment:
      <<: *app-env
      API_BASE_URL:                         "http://backend:8001"
      STREAMLIT_SERVER_PORT:                "8501"
      STREAMLIT_SERVER_ADDRESS:             "0.0.0.0"
      STREAMLIT_SERVER_HEADLESS:            "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"

    ports:
      - "8501:8501"

    volumes:
      - outputs_data:/app/outputs

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    networks:
      - app_net

    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

