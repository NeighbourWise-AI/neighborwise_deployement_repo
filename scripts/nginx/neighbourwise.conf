# ══════════════════════════════════════════════════════════════════════════════
# NeighbourWise AI — Nginx Reverse Proxy Config
# Place at: nginx/neighbourwise.conf
#
# LOCAL DEV:  All traffic on :80 → no TLS, direct proxy.
# EC2 PROD:   Uncomment the HTTPS server block + run Certbot to get certs.
# ══════════════════════════════════════════════════════════════════════════════

# ── Upstream service addresses (Docker service names) ─────────────────────────
upstream backend {
    server backend:8001;
    keepalive 32;
}

upstream frontend {
    server frontend:8501;
    keepalive 32;
}

# ── Rate limiting zones ────────────────────────────────────────────────────────
# 60 req/min per IP on the query endpoint — protects LLM cost budget
limit_req_zone $binary_remote_addr zone=query_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=report_limit:10m rate=5r/m;

# ════════════════════════════════════════════════════════════════════════════════
# HTTP SERVER  (also handles Let's Encrypt ACME challenge on EC2)
# ════════════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name _;          # replace _ with your domain on EC2 e.g. app.example.com

    # ── Let's Encrypt ACME challenge (EC2 only) ──────────────────────────────
    # Certbot writes to /var/www/certbot; nginx serves it at /.well-known/
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    # ── Redirect all HTTP → HTTPS on EC2 ─────────────────────────────────────
    # Uncomment once you have TLS certs:
    # return 301 https://$host$request_uri;

    # ── For local dev (no TLS): proxy everything below ────────────────────────
    include /etc/nginx/conf.d/proxy_rules.conf.inc;
}

